version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: wellmatch-postgres
    environment:
      POSTGRES_DB: wellmatch
      POSTGRES_USER: wellmatch
      POSTGRES_PASSWORD: wellmatch_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wellmatch-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wellmatch -d wellmatch']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wellmatch-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - wellmatch-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: wellmatch-backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://wellmatch:wellmatch_secret@postgres:5432/wellmatch
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wellmatch-network
    volumes:
      - ../backend/src:/app/src
    restart: unless-stopped

networks:
  wellmatch-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
